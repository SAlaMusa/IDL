dataset_name: cifar10
arch: resnet18
epochs: 200
warmup_epochs: 10
batch_size: 128
lr: null
weight_decay: 0.000001
temperature: 0.07
seed: 42
out_dim: 128
n_views: 2
workers: 2
fp16_precision: true
log_every_n_steps: 100

moco_queue_size: 4096
moco_momentum: 0.999

aug:
  crop: true
  flip: true
  jitter: true
  grayscale: true
  blur: true
